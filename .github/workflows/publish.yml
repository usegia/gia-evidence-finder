name: Publish

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}
      package_version: ${{ steps.package.outputs.package_version }}
      already_published: ${{ steps.package.outputs.already_published }}
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Check PyPI version
        id: package
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          print(f"package_name={project['name']}")
          print(f"package_version={project['version']}")
          PY

          PACKAGE_NAME="$(grep '^package_name=' "$GITHUB_OUTPUT" | cut -d= -f2-)"
          PACKAGE_VERSION="$(grep '^package_version=' "$GITHUB_OUTPUT" | cut -d= -f2-)"
          ALREADY_PUBLISHED="$(
            python - "$PACKAGE_NAME" "$PACKAGE_VERSION" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          package_name, package_version = sys.argv[1:3]
          url = f"https://pypi.org/pypi/{package_name}/{package_version}/json"
          request = urllib.request.Request(url, headers={"User-Agent": "gia-evidence-finder-ci"})
          try:
              with urllib.request.urlopen(request, timeout=20):
                  print("true")
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("false")
              else:
                  raise
          PY
          )"
          echo "already_published=${ALREADY_PUBLISHED}" >> "$GITHUB_OUTPUT"

      - name: Upload distributions
        if: steps.package.outputs.already_published == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    if: needs.build.outputs.already_published == 'false'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  github-release:
    needs:
      - build
      - publish
    if: needs.build.outputs.already_published == 'false' && github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ needs.build.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.build.outputs.package_version }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          tag="v${PACKAGE_VERSION}"
          gh release create "${tag}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${TARGET_SHA}" \
            --title "${tag}" \
            --notes "Published ${PACKAGE_NAME} ${PACKAGE_VERSION} to PyPI: https://pypi.org/project/${PACKAGE_NAME}/${PACKAGE_VERSION}/"

  already-published:
    needs: build
    if: needs.build.outputs.already_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped publish
        run: |
          echo "${{ needs.build.outputs.package_name }} ${{ needs.build.outputs.package_version }} is already on PyPI; skipping publish."
